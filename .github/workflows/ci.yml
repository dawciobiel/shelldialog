name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests and build JARs
        run: ./gradlew test jar fatJar

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shelldialog-jars
          path: build/libs/*.jar
