name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:

* type: markdown
  attributes:
  value: |
  Please fill out the information below to help us investigate the issue.

* type: input
  id: version
  attributes:
  label: Library version
  placeholder: e.g. 2.0.0
  validations:
  required: true

* type: input
  id: java_version
  attributes:
  label: Java version
  placeholder: e.g. 21
  validations:
  required: true

* type: input
  id: os
  attributes:
  label: Operating system
  placeholder: e.g. Linux / Windows / macOS
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to reproduce
  description: Provide a minimal reproducible example if possible.
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected behavior
  validations:
  required: true

* type: textarea
  id: actual
  attributes:
  label: Actual behavior
  validations:
  required: true

* type: textarea
  id: stacktrace
  attributes:
  label: Stack trace (if applicable)
  render: shell

